<!DOCTYPE html>
<html lang="ru">
<head>

<body>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
(async () => {
  try {
    const me = await api.me();
    window.location.href = me.logged_in ? 'pages/main.html' : 'pages/login.html';
  } catch (e) {
    window.location.href = 'pages/login.html';
  }
})();
</script>
