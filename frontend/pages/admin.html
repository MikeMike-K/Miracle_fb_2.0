<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Админ-панель | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container pb-4" style="max-width:960px;">
  <div class="page-header">
    <h1 class="page-title">Админ-панель</h1>
    <div class="page-header__actions">
      <a href="admin_reports.html" class="btn btn-outline-primary"><i class="bi bi-envelope-paper me-1"></i>Настройки отчётов</a>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <h5>Сменить свой пароль</h5>
    <form id="passwordForm" class="row g-2 mt-1">
      <div class="col-md-5"><input type="password" class="form-control" name="new_password" placeholder="Новый пароль" required></div>
      <div class="col-md-5"><input type="password" class="form-control" name="confirm_password" placeholder="Повторите пароль" required></div>
      <div class="col-md-2"><button class="btn btn-primary w-100">Сохранить</button></div>
    </form>
  </div>

  <div class="card p-4 mb-4">
    <h5>Создать пользователя</h5>
    <form id="createUserForm" class="row g-2 mt-1">
      <div class="col-md-4"><input class="form-control" name="last_name" placeholder="Фамилия" required></div>
      <div class="col-md-4"><input class="form-control" name="first_name" placeholder="Имя" required></div>
      <div class="col-md-4"><input class="form-control" name="patronymic" placeholder="Отчество"></div>
      <div class="col-md-4"><input class="form-control" name="email" type="email" placeholder="Email" required></div>
      <div class="col-md-4"><input class="form-control" name="username" placeholder="Логин" required></div>
      <div class="col-md-4"><input class="form-control" name="password" placeholder="Пароль" required></div>
      <div class="col-md-4">
        <select class="form-select" name="role" id="createRoleSelect">
          <option value="manager">Менеджер</option>
          <option value="local_admin" id="createRoleLocalAdmin">Локальный админ</option>
          <option value="admin" id="createRoleAdmin">Администратор</option>
        </select>
      </div>
      <div class="col-md-2"><button class="btn btn-orange w-100">Создать</button></div>
    </form>
  </div>

  <div class="card mb-4 list-search-bar">
    <div class="card-body py-2">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="search" class="form-control" id="listSearch" placeholder="Поиск: логин, ФИО, роль, email..." autocomplete="off">
      </div>
      <small id="listSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    </div>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table miracle-table mb-0">
        <thead><tr><th>Логин</th><th>ФИО</th><th>Роль</th><th>Email</th><th></th></tr></thead>
        <tbody id="usersRows"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/list_search.js"></script>
<script>
let allUsers = [];
let refreshUsersSearch = () => {};

function roleLabel(role) {
  return { admin: 'Администратор', local_admin: 'Локальный админ', manager: 'Менеджер' }[role] || role;
}

function canEditUser(me, user) {
  if (me.role === 'admin') return true;
  return !['admin', 'local_admin'].includes(user.role);
}

function renderUsers(list, me) {
  document.getElementById('usersRows').innerHTML = list.length ? list.map(u => `
    <tr>
      <td>${escapeHtml(u.username)}</td>
      <td>${escapeHtml(u.first_name)} ${escapeHtml(u.last_name)}</td>
      <td>${escapeHtml(roleLabel(u.role))}</td>
      <td>${escapeHtml(u.email||'')}</td>
      <td>${canEditUser(me, u)
        ? `<a class="btn btn-sm btn-outline-secondary" href="admin_edit_user.html?id=${u.id}">Изменить</a>`
        : '<span class="text-muted small">только admin</span>'}</td>
    </tr>`).join('') : `<tr><td colspan="5" class="text-center text-muted py-4">${allUsers.length ? 'Ничего не найдено' : 'Нет пользователей'}</td></tr>`;
}

async function loadUsers() {
  allUsers = await api.adminUsers();
  refreshUsersSearch();
}

(async () => {
  const me = await requireAuth(); if (!me) return;
  if (!['admin','local_admin'].includes(me.role)) { showToast('Нет прав', 'error'); window.location.href = 'main.html'; return; }
  if (me.role !== 'admin') {
    document.getElementById('createRoleLocalAdmin').remove();
    document.getElementById('createRoleAdmin').remove();
  }
  renderNavbar('admin', me);
  refreshUsersSearch = setupListSearch({
    inputId: 'listSearch',
    countId: 'listSearchCount',
    getItems: () => allUsers,
    render: (list) => renderUsers(list, me),
    searchText: (u) => [u.username, u.first_name, u.last_name, u.patronymic, u.role, u.email].join(' '),
  });
  try { await loadUsers(); } catch (e) { showToast(e.message, 'error'); }

  document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try { await api.adminChangePassword(fd); showToast('Пароль изменен!'); e.target.reset(); }
    catch (err) { showToast(err.message, 'error'); }
  });

  document.getElementById('createUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try { const r = await api.adminCreateUser(fd); showToast(r.message); e.target.reset(); loadUsers(); }
    catch (err) { showToast(err.message, 'error'); }
  });
})();
</script>
</body>
</html>
