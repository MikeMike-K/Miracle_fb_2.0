<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Редактирование пользователя | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container pb-4" style="max-width:600px;">
  <a href="admin.html" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад в админ-панель</a>
  <div class="card p-4">
    <h4>Редактирование пользователя</h4>
    <form id="userForm" class="row g-2 mt-1">
      <div class="col-md-6"><label class="form-label">Фамилия</label><input class="form-control" name="last_name" required></div>
      <div class="col-md-6"><label class="form-label">Имя</label><input class="form-control" name="first_name" required></div>
      <div class="col-md-6"><label class="form-label">Отчество</label><input class="form-control" name="patronymic"></div>
      <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" name="email" type="email" required></div>
      <div class="col-md-6"><label class="form-label">Логин</label><input class="form-control" name="username" required></div>
      <div class="col-md-6"><label class="form-label">Новый пароль</label><input class="form-control" name="password" placeholder="оставьте пустым, чтобы не менять"></div>
      <div class="col-md-6">
        <label class="form-label">Роль</label>
        <select class="form-select" name="role" id="roleSelect">
          <option value="manager">Менеджер</option>
          <option value="local_admin" id="roleLocalAdmin">Локальный админ</option>
          <option value="admin" id="roleAdmin">Администратор</option>
        </select>
      </div>
      <div class="col-12 mt-3"><button class="btn btn-primary">Сохранить</button></div>
    </form>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script>
const params = new URLSearchParams(location.search);
const userId = params.get('id');

(async () => {
  const me = await requireAuth(); if (!me) return;
  if (!['admin','local_admin'].includes(me.role)) { showToast('Нет прав', 'error'); window.location.href = 'main.html'; return; }
  if (me.role !== 'admin') {
    document.getElementById('roleLocalAdmin').remove();
    document.getElementById('roleAdmin').remove();
  }
  renderNavbar('admin', me);
  try {
    const u = await api.adminGetUser(userId);
    if (me.role !== 'admin' && ['admin', 'local_admin'].includes(u.role)) {
      showToast('Только главный администратор может редактировать администраторов', 'error');
      window.location.href = 'admin.html';
      return;
    }
    const f = document.getElementById('userForm');
    for (const key of ['last_name','first_name','patronymic','email','username','role']) {
      if (f[key]) f[key].value = u[key] || '';
    }
  } catch (e) { showToast(e.message, 'error'); }

  document.getElementById('userForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try { await api.adminEditUser(userId, fd); showToast('Пользователь обновлен!'); window.location.href = 'admin.html'; }
    catch (err) { showToast(err.message, 'error'); }
  });
})();
</script>
</body>
</html>
