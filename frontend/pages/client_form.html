<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Физ. лицо | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container form-page pb-4" style="max-width:900px;">
  <div id="backBar" style="display:none"><a id="returnToLink" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад</a></div>
  <h1 id="pageTitle" class="page-title mb-4">Новое физическое лицо</h1>

  <div class="card p-4 mb-4 form-card">
    <form id="clientForm">
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Фамилия</label><input class="form-control" name="last_name" required></div>
        <div class="col-md-4"><label class="form-label">Имя</label><input class="form-control" name="first_name" required></div>
        <div class="col-md-4"><label class="form-label">Отчество</label><input class="form-control" name="patronymic"></div>
        <div class="col-md-4"><label class="form-label">Дата рождения</label><input type="date" class="form-control" name="dob"></div>
        <div class="col-md-4"><label class="form-label">Должность</label><input class="form-control" name="position" required></div>
        <div class="col-md-4"><label class="form-label">Телефон</label><input type="tel" class="form-control" name="phone" required></div>
        <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email"></div>
        <div class="col-12"><label class="form-label">Описание</label><textarea class="form-control" name="description" rows="3"></textarea></div>
      </div>
      <button type="submit" class="btn btn-primary mt-3" id="submitBtn">Сохранить</button>
      <button type="button" class="btn btn-outline-secondary mt-3" id="editBtn" style="display:none">Редактировать</button>
    </form>
  </div>

  <div id="employersBlock" class="card p-4 mb-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">Работодатели</h5>
      <div class="d-flex gap-2">
        <a id="addEmployerLink" class="btn btn-sm btn-outline-primary">+ Из списка</a>
        <a id="createEmployerLink" class="btn btn-sm btn-orange">+ Создать компанию</a>
      </div>
    </div>
    <div class="input-group input-group-sm mt-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="search" class="form-control" id="employersSearch" placeholder="Поиск компаний..." autocomplete="off">
    </div>
    <small id="employersSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    <div id="employersList" class="mt-2"></div>
  </div>

  <div id="eventsBlock" class="card p-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">Мероприятия</h5>
      <button type="button" class="btn btn-sm btn-orange" id="toggleEventFormBtn">+ Новое мероприятие</button>
    </div>
    <div class="input-group input-group-sm mt-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="search" class="form-control" id="eventsSearch" placeholder="Поиск мероприятий..." autocomplete="off">
    </div>
    <small id="eventsSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    <div class="mt-3 d-none" id="newEventForm">
      <form id="eventForm" class="row g-2">
        <div class="col-md-4">
          <select class="form-select" name="event_type" required></select>
        </div>
        <div class="col-md-3"><input type="date" class="form-control" name="planned_date" required></div>
        <div class="col-md-3" id="responsibleSelectWrap"><select class="form-select" name="responsible_user"></select></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Создать</button></div>
        <div class="col-12"><textarea class="form-control" name="description" placeholder="Описание" rows="2"></textarea></div>
      </form>
    </div>
    <div id="eventsList" class="mt-3"></div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/form_options.js"></script>
<script src="../js/events_ui.js"></script>
<script src="../js/list_search.js"></script>
<script>
const params = new URLSearchParams(location.search);
const clientId = params.get('id');
const returnTo = params.get('return_to');
let me;
let clientPageData = { employers: [], events: { planned: [], completed: [], cancelled: [] } };
let refreshEmployersSearch = () => {};

function selfPageUrl() {
  const base = `client_form.html?id=${clientId}`;
  return returnTo ? `${base}&return_to=${encodeURIComponent(returnTo)}` : base;
}

async function unlinkEmployer(companyId) {
  try {
    await api.clientUnlinkEmployer(clientId, companyId);
    showToast('Работодатель отвязан');
    loadClient();
  } catch (e) { showToast(e.message, 'error'); }
}
let refreshEventsSearch = () => {};

function cancelEvent(eventId) {
  if (!confirm('Отменить мероприятие?')) return;
  runEventAction(() => api.clientEventCancel(clientId, eventId));
}
async function runEventAction(fn) {
  try { await fn(); showToast('Готово'); loadClient(); } catch (e) { showToast(e.message, 'error'); }
}

async function loadClient() {
  const data = await api.clientGet(clientId);
  const c = data.client;
  const f = document.getElementById('clientForm');
  for (const key of ['last_name','first_name','patronymic','dob','position','phone','email','description']) {
    if (f[key]) f[key].value = c[key] || '';
  }
  document.getElementById('pageTitle').textContent = `${c.last_name} ${c.first_name} ${c.patronymic||''}`;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('editBtn').style.display = 'inline-block';
  setFormReadonly(true);

  document.getElementById('employersBlock').style.display = 'block';
  document.getElementById('addEmployerLink').href = `select_employer_for_client.html?client_id=${clientId}`;
  document.getElementById('createEmployerLink').href = `company_form.html?client_id=${clientId}&return_to=${encodeURIComponent(selfPageUrl())}`;
  clientPageData.employers = data.employers;
  refreshEmployersSearch();

  clientPageData.events = {
    planned: data.planned_events,
    completed: data.completed_events,
    cancelled: data.cancelled_events,
  };
  document.getElementById('eventsBlock').style.display = 'block';
  refreshEventsSearch();
}

function renderEmployers(list) {
  const el = document.getElementById('employersList');
  if (!list.length) {
    el.innerHTML = `<p class="text-muted small">${clientPageData.employers.length ? 'Ничего не найдено' : 'Нет компаний'}</p>`;
    return;
  }
  el.innerHTML = list.map(e => `
    <div class="d-flex justify-content-between align-items-center border-bottom py-2">
      <div>
        <a href="company_form.html?id=${e.id}&return_to=${encodeURIComponent(selfPageUrl())}">${escapeHtml(e.name)}</a>
        <span class="text-muted small"> — ${escapeHtml(e.status)}</span>
      </div>
      ${e.status === 'РАБОТАЕТ' ? `<button class="btn btn-sm btn-outline-danger" onclick="unlinkEmployer(${e.id})">Отвязать</button>` : ''}
    </div>`
  ).join('');
}

function setFormReadonly(readonly) {
  const f = document.getElementById('clientForm');
  [...f.elements].forEach(el => { if (el.tagName !== 'BUTTON') el.disabled = readonly; });
}

(async () => {
  me = await requireAuth(); if (!me) return;
  renderNavbar('clients_physical', me);
  if (returnTo) {
    document.getElementById('backBar').style.display = 'block';
    document.getElementById('returnToLink').href = returnTo;
  }

  initEventTypeSelect(document.querySelector('#eventForm select[name="event_type"]'));
  initEventFormToggle();

  if (clientId) {
    refreshEmployersSearch = setupListSearch({
      inputId: 'employersSearch',
      countId: 'employersSearchCount',
      getItems: () => clientPageData.employers,
      render: renderEmployers,
      searchText: (e) => [e.name, e.status].join(' '),
    });
    refreshEventsSearch = setupEventsSearch({
      inputId: 'eventsSearch',
      countId: 'eventsSearchCount',
      listId: 'eventsList',
      getEvents: () => clientPageData.events,
      baseUrl: `view_event.html?ctx=client&parent_id=${clientId}`,
      ctx: 'client',
      parentId: clientId,
    });
    await loadClient();
    document.getElementById('editBtn').addEventListener('click', () => {
      setFormReadonly(false);
      document.getElementById('submitBtn').style.display = 'inline-block';
      document.getElementById('editBtn').style.display = 'none';
    });
    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      try { await api.clientEdit(clientId, fd); showToast('Данные обновлены!'); loadClient(); }
      catch (err) { showToast(err.message, 'error'); }
    });

    // Списки пользователей для select ответственного (если не менеджер)
    if (me.role !== 'manager') {
      try {
        const users = await api.usersList();
        document.querySelector('select[name="responsible_user"]').innerHTML =
          users.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join('');
      } catch (err) {
        document.getElementById('responsibleSelectWrap').style.display = 'none';
      }
    } else {
      document.getElementById('responsibleSelectWrap').style.display = 'none';
    }

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      try {
        await api.clientEventAdd(clientId, fd);
        showToast('Мероприятие создано!');
        e.target.reset();
        initEventTypeSelect(document.querySelector('#eventForm select[name="event_type"]'));
        await loadClient();
      } catch (err) { showToast(err.message, 'error'); }
    });
  } else {
    document.getElementById('clientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      const companyId = params.get('company_id');
      try {
        const r = await api.clientCreate(fd, companyId);
        showToast('Сохранено!');
        window.location.href = companyId ? `company_form.html?id=${companyId}` : `client_form.html?id=${r.id}`;
      } catch (err) { showToast(err.message, 'error'); }
    });
  }
})();
</script>
</body>
</html>
