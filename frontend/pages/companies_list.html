<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Компании | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container pb-4">
  <div class="page-header">
    <h1 class="page-title">Компании</h1>
    <div class="page-header__actions">
      <a href="company_form.html" class="btn btn-orange"><i class="bi bi-plus-lg me-1"></i>Добавить</a>
    </div>
  </div>
  <div class="card mb-3 list-search-bar">
    <div class="card-body py-2">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="search" class="form-control" id="listSearch" placeholder="Поиск: название, тип, деятельность, страна..." autocomplete="off">
      </div>
      <small id="listSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    </div>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table miracle-table mb-0">
        <thead><tr><th>Название</th><th>Тип</th><th>Деятельность</th><th>Страна</th><th>Сотрудников</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/list_search.js"></script>
<script>
let allCompanies = [];

function renderCompanies(list) {
  const rows = document.getElementById('rows');
  if (!list.length) {
    rows.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">${allCompanies.length ? 'Ничего не найдено' : 'Нет записей'}</td></tr>`;
    return;
  }
  rows.innerHTML = list.map(c => `
    <tr style="cursor:pointer" onclick="location.href='company_form.html?id=${c.id}'">
      <td>${escapeHtml(c.name)}</td>
      <td>${escapeHtml(c.type||'')}</td>
      <td>${escapeHtml(c.activity||'')}</td>
      <td>${escapeHtml(c.country||'')}</td>
      <td>${c.emp_count}</td>
    </tr>`).join('');
}

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('companies', me);
  try {
    allCompanies = await api.companiesList();
    setupListSearch({
      inputId: 'listSearch',
      countId: 'listSearchCount',
      getItems: () => allCompanies,
      render: renderCompanies,
      searchText: (c) => [c.name, c.type, c.activity, c.country, c.website, String(c.emp_count)].join(' '),
    });
  } catch (e) { showToast(e.message, 'error'); }
})();
</script>
</body>
</html>
