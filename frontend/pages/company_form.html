<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Компания | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container form-page pb-4" style="max-width:960px;">
  <div id="backBar" style="display:none"><a id="returnToLink" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад</a></div>
  <h1 id="pageTitle" class="page-title mb-4">Новая компания</h1>

  <div class="card p-4 mb-4 form-card">
    <form id="companyForm">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Название</label><input class="form-control" name="name" required></div>
        <div class="col-md-3"><label class="form-label">Страна</label><select class="form-select" name="country"></select></div>
        <div class="col-md-3"><label class="form-label">Тип</label><select class="form-select" name="type"></select></div>
        <div class="col-md-6"><label class="form-label">Деятельность</label><select class="form-select" name="activity"></select></div>
        <div class="col-md-6">
          <label class="form-label">Сайт <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="text" class="form-control" name="website" placeholder="www.example.ru или https://..." required inputmode="url" autocomplete="url">
            <a id="openWebsiteBtn" class="btn btn-outline-primary" target="_blank" rel="noopener noreferrer" style="display:none" title="Открыть сайт">↗</a>
            <button type="button" id="addWebsiteBtn" class="btn btn-outline-warning" style="display:none">Добавить ссылку</button>
          </div>
        </div>
        <div class="col-12"><label class="form-label">Описание</label><textarea class="form-control" name="description" rows="3"></textarea></div>
      </div>
      <button type="submit" class="btn btn-primary mt-3" id="submitBtn">Сохранить</button>
      <button type="button" class="btn btn-outline-secondary mt-3" id="editBtn" style="display:none">Редактировать</button>
    </form>
  </div>

  <div id="employeesBlock" class="card p-4 mb-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">Сотрудники</h5>
      <div class="d-flex gap-2">
        <a id="addEmployeeLink" class="btn btn-sm btn-outline-primary">+ Из списка</a>
        <a id="createEmployeeLink" class="btn btn-sm btn-orange">+ Создать сотрудника</a>
      </div>
    </div>
    <div class="input-group input-group-sm mt-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="search" class="form-control" id="employeesSearch" placeholder="Поиск сотрудников..." autocomplete="off">
    </div>
    <small id="employeesSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    <div id="employeesList" class="mt-2"></div>
  </div>

  <div id="projectsBlock" class="card p-4 mb-4" style="display:none">
    <h5>Проекты</h5>
    <div class="input-group input-group-sm mt-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="search" class="form-control" id="projectsSearch" placeholder="Поиск проектов..." autocomplete="off">
    </div>
    <small id="projectsSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    <div id="projectsList" class="mt-2"></div>
  </div>

  <div id="eventsBlock" class="card p-4" style="display:none">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <h5 class="mb-0">Мероприятия</h5>
      <button type="button" class="btn btn-sm btn-orange" id="toggleEventFormBtn">+ Новое мероприятие</button>
    </div>
    <div class="input-group input-group-sm mt-3">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="search" class="form-control" id="eventsSearch" placeholder="Поиск мероприятий..." autocomplete="off">
    </div>
    <small id="eventsSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    <div class="mt-3 d-none" id="newEventForm">
      <form id="eventForm" class="row g-2">
        <div class="col-md-4">
          <select class="form-select" name="event_type" required></select>
        </div>
        <div class="col-md-3"><input type="date" class="form-control" name="planned_date" required></div>
        <div class="col-md-3" id="responsibleSelectWrap"><select class="form-select" name="responsible_user"></select></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Создать</button></div>
        <div class="col-12"><textarea class="form-control" name="description" placeholder="Описание" rows="2"></textarea></div>
      </form>
    </div>
    <div id="eventsList" class="mt-3"></div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/form_options.js"></script>
<script src="../js/events_ui.js"></script>
<script src="../js/list_search.js"></script>
<script>
const params = new URLSearchParams(location.search);
const companyId = params.get('id');
const returnTo = params.get('return_to');
let me;
let companyPageData = { employees: [], projects: [], events: { planned: [], completed: [], cancelled: [] } };
let refreshEmployeesSearch = () => {};
let refreshProjectsSearch = () => {};
let refreshEventsSearch = () => {};

function selfPageUrl() {
  const base = `company_form.html?id=${companyId}`;
  return returnTo ? `${base}&return_to=${encodeURIComponent(returnTo)}` : base;
}

function cancelEvent(eventId) {
  if (!confirm('Отменить мероприятие?')) return;
  runEventAction(() => api.companyEventCancel(companyId, eventId));
}
async function runEventAction(fn) {
  try { await fn(); showToast('Готово'); loadCompany(); } catch (e) { showToast(e.message, 'error'); }
}
async function unlinkEmployee(clientId) {
  try { await api.companyUnlinkEmployee(companyId, clientId); showToast('Сотрудник удален'); loadCompany(); }
  catch (e) { showToast(e.message, 'error'); }
}

async function loadCompany() {
  const data = await api.companyGet(companyId);
  const c = data.company;
  const f = document.getElementById('companyForm');
  f.name.value = c.name || '';
  setFormSelect(f, 'country', FORM_OPTIONS.countries, 'Выберите страну...', c.country);
  setFormSelect(f, 'activity', FORM_OPTIONS.companyActivities, 'Выберите...', c.activity);
  setFormSelect(f, 'type', FORM_OPTIONS.companyTypes, 'Выберите тип...', c.type);
  f.website.value = c.website || '';
  f.description.value = c.description || '';
  updateWebsiteButtons(c.website);
  document.getElementById('pageTitle').textContent = c.name;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('editBtn').style.display = 'inline-block';
  setFormReadonly(true);

  document.getElementById('employeesBlock').style.display = 'block';
  document.getElementById('addEmployeeLink').href = `select_employee.html?company_id=${companyId}`;
  document.getElementById('createEmployeeLink').href = `client_form.html?company_id=${companyId}`;
  companyPageData.employees = data.employees;
  companyPageData.projects = data.projects;
  companyPageData.events = {
    planned: data.planned_events,
    completed: data.completed_events,
    cancelled: data.cancelled_events,
  };
  refreshEmployeesSearch();
  document.getElementById('projectsBlock').style.display = 'block';
  refreshProjectsSearch();
  refreshEventsSearch();
}

function renderEmployees(list) {
  const el = document.getElementById('employeesList');
  if (!list.length) {
    el.innerHTML = `<p class="text-muted small">${companyPageData.employees.length ? 'Ничего не найдено' : 'Нет сотрудников'}</p>`;
    return;
  }
  el.innerHTML = list.map(e => `
    <div class="d-flex justify-content-between align-items-center border-bottom py-2">
      <a href="client_form.html?id=${e.id}&return_to=${encodeURIComponent(selfPageUrl())}">${escapeHtml(e.last_name)} ${escapeHtml(e.first_name)} ${escapeHtml(e.patronymic||'')}</a>
      <span class="text-muted small">${escapeHtml(e.position||'')}</span>
      <button class="btn btn-sm btn-outline-danger" onclick="unlinkEmployee(${e.id})">Удалить</button>
    </div>`).join('');
}

function renderProjects(list) {
  const el = document.getElementById('projectsList');
  if (!list.length) {
    el.innerHTML = `<p class="text-muted small">${companyPageData.projects.length ? 'Ничего не найдено' : 'Компания пока не участвует в проектах'}</p>`;
    return;
  }
  el.innerHTML = list.map(p =>
    `<div class="border-bottom py-2"><a href="project_form.html?id=${p.id}">${escapeHtml(p.name)}</a> — <span class="text-muted small">${escapeHtml(p.status||'')}, ${escapeHtml(p.address||'')}</span></div>`
  ).join('');
}

function companyFormPayload(form) {
  const fd = Object.fromEntries(new FormData(form));
  fd.website = normalizeWebsite(fd.website);
  return fd;
}

function setFormReadonly(readonly) {
  const f = document.getElementById('companyForm');
  [...f.elements].forEach(el => { if (el.tagName !== 'BUTTON') el.disabled = readonly; });
  updateWebsiteButtons(f.website.value);
}

function updateWebsiteButtons(website) {
  const url = normalizeWebsite(website);
  const openBtn = document.getElementById('openWebsiteBtn');
  const addBtn = document.getElementById('addWebsiteBtn');
  const f = document.getElementById('companyForm');
  const isReadonly = f && f.website && f.website.disabled;
  if (url) {
    openBtn.href = url;
    openBtn.style.display = '';
    addBtn.style.display = 'none';
  } else {
    openBtn.style.display = 'none';
    addBtn.style.display = isReadonly ? '' : 'none';
  }
}

(async () => {
  me = await requireAuth(); if (!me) return;
  renderNavbar('companies', me);
  if (returnTo) {
    document.getElementById('backBar').style.display = 'block';
    document.getElementById('returnToLink').href = returnTo;
  } else if (params.get('client_id')) {
    document.getElementById('backBar').style.display = 'block';
    document.getElementById('returnToLink').href = `client_form.html?id=${params.get('client_id')}`;
  }

  const companyForm = document.getElementById('companyForm');
  setFormSelect(companyForm, 'country', FORM_OPTIONS.countries, 'Выберите страну...', '');
  setFormSelect(companyForm, 'activity', FORM_OPTIONS.companyActivities, 'Выберите...', '');
  setFormSelect(companyForm, 'type', FORM_OPTIONS.companyTypes, 'Выберите тип...', '');
  initEventTypeSelect(document.querySelector('#eventForm select[name="event_type"]'));
  initEventFormToggle();
  document.getElementById('companyForm').website.addEventListener('input', (e) => updateWebsiteButtons(e.target.value));
  document.getElementById('companyForm').website.addEventListener('blur', (e) => {
    const n = normalizeWebsite(e.target.value);
    if (n && n !== e.target.value.trim()) e.target.value = n;
    updateWebsiteButtons(e.target.value);
  });
  document.getElementById('addWebsiteBtn').addEventListener('click', () => {
    setFormReadonly(false);
    document.getElementById('submitBtn').style.display = 'inline-block';
    document.getElementById('editBtn').style.display = 'none';
    document.getElementById('companyForm').website.focus();
    updateWebsiteButtons('');
  });

  if (companyId) {
    refreshEmployeesSearch = setupListSearch({
      inputId: 'employeesSearch',
      countId: 'employeesSearchCount',
      getItems: () => companyPageData.employees,
      render: renderEmployees,
      searchText: (e) => [e.last_name, e.first_name, e.patronymic, e.position, e.phone, e.email].join(' '),
    });
    refreshProjectsSearch = setupListSearch({
      inputId: 'projectsSearch',
      countId: 'projectsSearchCount',
      getItems: () => companyPageData.projects,
      render: renderProjects,
      searchText: (p) => [p.name, p.status, p.address, p.project_type].join(' '),
    });
    refreshEventsSearch = setupEventsSearch({
      inputId: 'eventsSearch',
      countId: 'eventsSearchCount',
      listId: 'eventsList',
      getEvents: () => companyPageData.events,
      baseUrl: `view_event.html?ctx=company&parent_id=${companyId}`,
      ctx: 'company',
      parentId: companyId,
    });
    document.getElementById('eventsBlock').style.display = 'block';
    await loadCompany();
    document.getElementById('editBtn').addEventListener('click', () => {
      setFormReadonly(false);
      document.getElementById('submitBtn').style.display = 'inline-block';
      document.getElementById('editBtn').style.display = 'none';
    });
    document.getElementById('companyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = companyFormPayload(e.target);
      try { await api.companyEdit(companyId, fd); showToast('Компания обновлена!'); loadCompany(); }
      catch (err) { showToast(err.message, 'error'); }
    });

    if (me.role !== 'manager') {
      try {
        const users = await api.usersList();
        document.querySelector('select[name="responsible_user"]').innerHTML =
          users.map(u => `<option value="${escapeHtml(u)}">${escapeHtml(u)}</option>`).join('');
      } catch (err) {
        document.getElementById('responsibleSelectWrap').style.display = 'none';
      }
    } else {
      document.getElementById('responsibleSelectWrap').style.display = 'none';
    }

    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = Object.fromEntries(new FormData(e.target));
      try {
        await api.companyEventAdd(companyId, fd);
        showToast('Мероприятие создано!');
        e.target.reset();
        initEventTypeSelect(document.querySelector('#eventForm select[name="event_type"]'));
        await loadCompany();
      } catch (err) { showToast(err.message, 'error'); }
    });
  } else {
    document.getElementById('companyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = companyFormPayload(e.target);
      const projectId = params.get('project_id');
      const linkClientId = params.get('client_id');
      try {
        const r = await api.companyCreate(fd, projectId, linkClientId);
        showToast('Сохранено!');
        if (linkClientId) window.location.href = `client_form.html?id=${linkClientId}`;
        else window.location.href = projectId ? `project_form.html?id=${projectId}` : `company_form.html?id=${r.id}`;
      } catch (err) { showToast(err.message, 'error'); }
    });
  }
})();
</script>
</body>
</html>
