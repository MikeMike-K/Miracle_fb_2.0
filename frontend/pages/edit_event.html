<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Завершение мероприятия | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container" style="max-width:700px;">
  <a id="backLink" href="#" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад</a>
  <div class="card p-4">
    <h4 id="title">Завершение мероприятия</h4>
    <form id="finishForm" class="mt-3">
      <div class="mb-3">
        <label class="form-label">Результат</label>
        <select class="form-select" name="result" required></select>
      </div>
      <div class="mb-3"><label class="form-label">Описание результата</label><textarea class="form-control" name="completion_desc" rows="3" placeholder="Кратко опишите итог..."></textarea></div>
      <div class="mb-3">
        <label class="form-label">Оценка (1-5)</label>
        <select class="form-select" name="rating" required>
          <option value="">Выберите оценку...</option>
          <option value="1">1 — Очень плохо</option>
          <option value="2">2</option>
          <option value="3">3 — Средне</option>
          <option value="4">4</option>
          <option value="5">5 — Отлично</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Завершить мероприятие</button>
    </form>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/form_options.js"></script>
<script>
const params = new URLSearchParams(location.search);
const ctx = params.get('ctx');
const parentId = params.get('parent_id');
const eventId = params.get('event_id');
const returnTo = params.get('return_to');

const finishers = {
  client: (payload) => api.clientEventFinish(parentId, eventId, payload),
  company: (payload) => api.companyEventFinish(parentId, eventId, payload),
  project: (payload) => api.projectEventFinish(parentId, eventId, payload),
};
const backUrls = {
  client: `client_form.html?id=${parentId}`,
  company: `company_form.html?id=${parentId}`,
  project: `project_form.html?id=${parentId}`,
};

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('', me);
  document.getElementById('backLink').href = returnTo || backUrls[ctx];
  initEventResultSelect(document.querySelector('#finishForm select[name="result"]'));

  document.getElementById('finishForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try {
      await finishers[ctx](fd);
      showToast('Мероприятие завершено!');
      window.location.href = returnTo || backUrls[ctx];
    } catch (err) { showToast(err.message, 'error'); }
  });
})();
</script>
</body>
</html>
