<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход | Miracle 2.0</title>
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body class="login-page">
<div class="login-shell">
  <div class="card login-card">
    <div class="login-brand">
      <img src="../assets/logo.svg" alt="Miracle">
      <h1>Miracle 2.0</h1>
      <p>CRM для работы с клиентами и проектами</p>
    </div>
    <div id="errorBox" class="alert alert-danger d-none"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Логин</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" name="username" required autofocus placeholder="admin">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Пароль</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password" required placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">Войти в систему</button>
    </form>
  </div>
  <p class="text-center mt-3 mb-0" style="color:rgba(255,255,255,0.5);font-size:0.8rem;">© Miracle 2.0</p>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const errorBox = document.getElementById('errorBox');
  errorBox.classList.add('d-none');
  try {
    await api.login(fd.get('username'), fd.get('password'));
    window.location.href = 'main.html';
  } catch (err) {
    const msg = err.message === 'Failed to fetch'
      ? 'Не удалось связаться с backend. Запущен ли python app.py в папке backend?'
      : err.message;
    errorBox.textContent = msg;
    errorBox.classList.remove('d-none');
  }
});
</script>
</body>
</html>
