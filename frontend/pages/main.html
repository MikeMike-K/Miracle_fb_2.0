<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Главная | Miracle 2.0</title>
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container pb-4">
  <section class="home-hero">
    <img src="../assets/logo.svg" alt="Miracle" class="home-hero__logo">
    <h1 class="home-hero__title brand-name">Miracle 2.0</h1>
    <p id="welcome" class="home-hero__welcome"></p>
  </section>
  <div class="row g-4 justify-content-center">
    <div class="col-sm-6 col-lg-4">
      <a href="clients_physical.html" class="home-tile home-tile--clients">
        <div class="card">
          <span class="home-tile__icon"><i class="bi bi-person-lines-fill"></i></span>
          <h5>Физические лица</h5>
          <p>Контакты, должности, работодатели</p>
        </div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-4">
      <a href="companies_list.html" class="home-tile home-tile--companies">
        <div class="card">
          <span class="home-tile__icon"><i class="bi bi-building"></i></span>
          <h5>Компании</h5>
          <p>Клиенты, партнёры, поставщики</p>
        </div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-4">
      <a href="projects_list.html" class="home-tile home-tile--projects">
        <div class="card">
          <span class="home-tile__icon"><i class="bi bi-kanban"></i></span>
          <h5>Проекты</h5>
          <p>Тендеры, бюджеты, мероприятия</p>
        </div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-4" id="adminCard" style="display:none">
      <a href="admin.html" class="home-tile home-tile--admin">
        <div class="card">
          <span class="home-tile__icon"><i class="bi bi-shield-lock"></i></span>
          <h5>Админ-панель</h5>
          <p>Пользователи и роли</p>
        </div>
      </a>
    </div>
    <div class="col-sm-6 col-lg-4" id="reportsCard" style="display:none">
      <a href="admin_reports.html" class="home-tile home-tile--reports">
        <div class="card">
          <span class="home-tile__icon"><i class="bi bi-envelope-paper"></i></span>
          <h5>Отчёты</h5>
          <p>Расписание и получатели</p>
        </div>
      </a>
    </div>
  </div>
  <footer class="app-footer">Miracle 2.0 · CRM</footer>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script>
(async () => {
  initMiracleUi();
  const me = await requireAuth();
  if (!me) return;
  renderNavbar('main', me);
  const name = [me.first_name, me.patronymic, me.last_name].filter(Boolean).join(' ') || me.username;
  document.getElementById('welcome').textContent = `Добро пожаловать, ${name}. Выберите раздел для работы.`;
  if (['admin', 'local_admin'].includes(me.role)) {
    document.getElementById('adminCard').style.display = 'block';
    document.getElementById('reportsCard').style.display = 'block';
  }
})();
</script>
</body>
</html>
