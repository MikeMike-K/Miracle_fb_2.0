<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Проекты | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container pb-4">
  <div class="page-header">
    <h1 class="page-title">Проекты</h1>
    <div class="page-header__actions">
      <a href="project_form.html" class="btn btn-orange"><i class="bi bi-plus-lg me-1"></i>Добавить</a>
    </div>
  </div>
  <div class="card mb-3 list-search-bar">
    <div class="card-body py-2">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="search" class="form-control" id="listSearch" placeholder="Поиск: название, тип, статус, адрес, бюджет..." autocomplete="off">
      </div>
      <small id="listSearchCount" class="text-muted list-search-count d-block mt-1"></small>
    </div>
  </div>
  <div class="card">
    <div class="card-body p-0">
      <table class="table miracle-table mb-0">
        <thead><tr><th>Название</th><th>Тип</th><th>Статус</th><th>Регион</th><th>Адрес</th><th>Бюджет</th><th>Компаний</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/list_search.js"></script>
<script src="../js/form_options.js"></script>
<script>
let allProjects = [];

function renderProjects(list) {
  const rows = document.getElementById('rows');
  if (!list.length) {
    rows.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">${allProjects.length ? 'Ничего не найдено' : 'Нет записей'}</td></tr>`;
    return;
  }
  rows.innerHTML = list.map(p => `
    <tr style="cursor:pointer" onclick="location.href='project_form.html?id=${p.id}'">
      <td>${escapeHtml(p.name)}</td>
      <td>${escapeHtml(p.project_type||'')}</td>
      <td>${escapeHtml(p.status||'')}</td>
      <td>${escapeHtml(p.region||'')}</td>
      <td>${escapeHtml(p.address||'')}</td>
      <td>${p.budget ? `${escapeHtml(p.budget)} ${currencySymbol(p.currency || 'RUB')}` : ''}</td>
      <td>${p.comp_count}</td>
    </tr>`).join('');
}

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('projects', me);
  try {
    allProjects = await api.projectsList();
    setupListSearch({
      inputId: 'listSearch',
      countId: 'listSearchCount',
      getItems: () => allProjects,
      render: renderProjects,
      searchText: (p) => [p.name, p.project_type, p.status, p.region, p.address, p.budget, p.currency, String(p.comp_count)].join(' '),
    });
  } catch (e) { showToast(e.message, 'error'); }
})();
</script>
</body>
</html>
