<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Добавить сотрудника | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container" style="max-width:960px;">
  <a id="backLink" href="#" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад в компанию</a>
  <div class="row g-4">
    <div class="col-md-7">
      <div class="card p-4">
        <h5>Выберите существующее физическое лицо</h5>
        <div class="input-group input-group-sm mt-3">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="search" class="form-control" id="listSearch" placeholder="Поиск: ФИО, должность..." autocomplete="off">
        </div>
        <small id="listSearchCount" class="text-muted list-search-count d-block mt-1"></small>
        <div id="list" class="mt-2"></div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card p-4 border-primary">
        <h5>Создать нового и добавить</h5>
        <form id="quickCreateForm" class="mt-3">
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label small">Фамилия</label>
              <input class="form-control" name="last_name" required>
            </div>
            <div class="col-6">
              <label class="form-label small">Имя</label>
              <input class="form-control" name="first_name" required>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label small">Должность</label>
            <input class="form-control" name="position" required placeholder="Менеджер">
          </div>
          <div class="mb-3">
            <label class="form-label small">Телефон</label>
            <input type="tel" class="form-control" name="phone" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Создать и добавить в компанию</button>
        </form>
        <p class="text-muted small mt-3 mb-0">Или откройте <a id="fullFormLink" href="#">полную карточку физ. лица</a>.</p>
      </div>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/list_search.js"></script>
<script>
const params = new URLSearchParams(location.search);
const companyId = params.get('company_id');
let allClients = [];

async function link(clientId) {
  try {
    await api.companyLinkEmployee(companyId, clientId);
    showToast('Сотрудник добавлен!');
    window.location.href = `company_form.html?id=${companyId}`;
  } catch (e) { showToast(e.message, 'error'); }
}

function renderClients(list) {
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<p class="text-muted">${allClients.length ? 'Ничего не найдено' : 'Нет доступных физических лиц'}</p>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="d-flex justify-content-between align-items-center border-bottom py-2">
      <span>${escapeHtml(c.last_name)} ${escapeHtml(c.first_name)} ${escapeHtml(c.patronymic || '')} <span class="text-muted small">${escapeHtml(c.position || '')}</span></span>
      <button class="btn btn-sm btn-primary" onclick="link(${c.id})">Добавить</button>
    </div>`).join('');
}

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('', me);
  document.getElementById('backLink').href = `company_form.html?id=${companyId}`;
  document.getElementById('fullFormLink').href = `client_form.html?company_id=${companyId}`;

  document.getElementById('quickCreateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = Object.fromEntries(new FormData(e.target));
    try {
      await api.clientCreate(fd, companyId);
      showToast('Сотрудник создан и добавлен!');
      window.location.href = `company_form.html?id=${companyId}`;
    } catch (err) { showToast(err.message, 'error'); }
  });

  try {
    allClients = await api.companyAvailableEmployees(companyId);
    setupListSearch({
      inputId: 'listSearch',
      countId: 'listSearchCount',
      getItems: () => allClients,
      render: renderClients,
      searchText: (c) => [c.last_name, c.first_name, c.patronymic, c.position, c.phone, c.email].join(' '),
    });
  } catch (e) { showToast(e.message, 'error'); }
})();
</script>
</body>
</html>
