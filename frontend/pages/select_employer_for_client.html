<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Добавить работодателя | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container" style="max-width:960px;">
  <a id="backLink" href="#" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад к физ. лицу</a>
  <div class="row g-4">
    <div class="col-md-7">
      <div class="card p-4">
        <h5>Выберите компанию-работодателя</h5>
        <div class="input-group input-group-sm mt-3">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="search" class="form-control" id="listSearch" placeholder="Поиск: название, тип..." autocomplete="off">
        </div>
        <small id="listSearchCount" class="text-muted list-search-count d-block mt-1"></small>
        <div id="list" class="mt-2"></div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card p-4 border-primary">
        <h5>Создать новую компанию</h5>
        <p class="text-muted small">Компания будет сразу привязана как работодатель.</p>
        <a id="createCompanyLink" class="btn btn-orange w-100" href="#">Создать компанию</a>
      </div>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/list_search.js"></script>
<script>
const params = new URLSearchParams(location.search);
const clientId = params.get('client_id');
let allCompanies = [];

async function link(companyId) {
  try {
    await api.companyLinkEmployee(companyId, clientId);
    showToast('Работодатель добавлен!');
    window.location.href = `client_form.html?id=${clientId}`;
  } catch (e) { showToast(e.message, 'error'); }
}

function renderCompanies(list) {
  const el = document.getElementById('list');
  if (!list.length) {
    el.innerHTML = `<p class="text-muted">${allCompanies.length ? 'Ничего не найдено' : 'Нет доступных компаний'}</p>`;
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="d-flex justify-content-between align-items-center border-bottom py-2">
      <span>${escapeHtml(c.name)} <span class="text-muted small">${escapeHtml(c.type || '')}</span></span>
      <button class="btn btn-sm btn-primary" onclick="link(${c.id})">Добавить</button>
    </div>`).join('');
}

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('', me);
  document.getElementById('backLink').href = `client_form.html?id=${clientId}`;
  document.getElementById('createCompanyLink').href = `company_form.html?client_id=${clientId}`;

  try {
    allCompanies = await api.clientAvailableEmployers(clientId);
    setupListSearch({
      inputId: 'listSearch',
      countId: 'listSearchCount',
      getItems: () => allCompanies,
      render: renderCompanies,
      searchText: (c) => [c.name, c.type, c.activity, c.country].join(' '),
    });
  } catch (e) { showToast(e.message, 'error'); }
})();
</script>
</body>
</html>
