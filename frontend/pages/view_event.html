<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
<title>Мероприятие | Miracle_2.0</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="navbar"></div>
<div class="container" style="max-width:700px;">
  <a id="backLink" href="#" class="btn btn-sm btn-outline-secondary mb-3">&larr; Назад</a>
  <div class="card p-4">
    <h4 id="title"></h4>
    <dl class="row mt-3" id="details"></dl>
    <a id="finishLink" class="btn btn-orange" style="display:none">Завершить мероприятие</a>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/navbar.js"></script>
<script>
const params = new URLSearchParams(location.search);
const ctx = params.get('ctx');         // client | company | project
const parentId = params.get('parent_id');
const eventId = params.get('event_id');

const getters = {
  client: () => api.clientEventGet(parentId, eventId),
  company: () => api.companyEventGet(parentId, eventId),
  project: () => api.projectEventGet(parentId, eventId),
};
const backUrls = {
  client: `client_form.html?id=${parentId}`,
  company: `company_form.html?id=${parentId}`,
  project: `project_form.html?id=${parentId}`,
};

(async () => {
  const me = await requireAuth(); if (!me) return;
  renderNavbar('', me);
  document.getElementById('backLink').href = backUrls[ctx];
  try {
    const e = await getters[ctx]();
    document.getElementById('title').textContent = e.event_type;
    document.getElementById('details').innerHTML = `
      <dt class="col-sm-4">Дата</dt><dd class="col-sm-8">${escapeHtml(e.start_date||'')}</dd>
      <dt class="col-sm-4">Ответственный</dt><dd class="col-sm-8">${escapeHtml(e.responsible_user||'')}</dd>
      <dt class="col-sm-4">Статус</dt><dd class="col-sm-8">${escapeHtml(e.status||'')}</dd>
      <dt class="col-sm-4">Описание</dt><dd class="col-sm-8">${escapeHtml(e.description||'')}</dd>
      ${e.status==='completed' ? `
      <dt class="col-sm-4">Результат</dt><dd class="col-sm-8">${escapeHtml(e.result||'')}</dd>
      <dt class="col-sm-4">Комментарий</dt><dd class="col-sm-8">${escapeHtml(e.completion_desc||'')}</dd>
      <dt class="col-sm-4">Оценка</dt><dd class="col-sm-8">${e.rating||''}</dd>` : ''}
    `;
    if (e.status === 'planned') {
      const finishLink = document.getElementById('finishLink');
      finishLink.style.display = 'inline-block';
      finishLink.href = `edit_event.html?ctx=${ctx}&parent_id=${parentId}&event_id=${eventId}`;
    }
  } catch (err) { showToast(err.message, 'error'); }
})();
</script>
</body>
</html>
